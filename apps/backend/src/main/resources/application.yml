spring:
  application:
    name: beelapay-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/beelapay
    username: beelapay
    password: beelapay

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8080
