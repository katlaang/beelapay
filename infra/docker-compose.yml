version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: beelapay-postgres
    environment:
      POSTGRES_DB: beelapay
      POSTGRES_USER: beelapay
      POSTGRES_PASSWORD: beelapay
    ports:
      - "5432:5432"
    volumes:
      - beelapay_pgdata:/var/lib/postgresql/data

volumes:
  beelapay_pgdata:
